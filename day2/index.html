<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 400px 400px 400px;
        }

        button {
            width: 100%;
            height: 100px;
            font-size: 2rem;
            background-image: linear-gradient(to top,white, black) ;
        }

        display{
            font-size: 32px;

        }

    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="display">
        <button id="one">1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
    </div>

    <script>
        // let btnOne = document.getElementById("one");
        // btnOne.addEventListener("click", function() {
        //     alert('You clicked the first button!')});

        let display = document.getElementById("display");
        btnOne.addEventListener("click", function() {
            display.value += btnOne.textContent;
        });
    </script>
</body>
</html>
